name: Robot Calc Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py calc_engine.py data_manager.py

      - name: Basic calculation test
        run: |
          python - <<'PY'
          from calc_engine import calculate_axis_move_time

          spec = {"acc": 3000, "dec": 3000, "vel": 1800}
          t = calculate_axis_move_time(500, spec)
          print("move time:", round(t, 4))
          assert t > 0
          PY
